name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ##################################
  ## Windows
  ##################################
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows Release
        shell: powershell
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath Tray-Windows.zip

      - name: Upload Windows Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/tray.exe
            Tray-Windows.zip

  ##################################
  ## macOS
  ##################################
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"

      - run: flutter pub get

      - run: flutter config --enable-macos-desktop

      - run: flutter build macos --release

      # Install create-dmg
      - run: brew install create-dmg

      # Create DMG
      - name: Build DMG
        run: |
          mkdir dmg
          cp -R build/macos/Build/Products/Release/*.app dmg/

          create-dmg \
            --volname "Tray" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            Tray.dmg \
            dmg/

      - uses: softprops/action-gh-release@v2
        with:
          files: Tray.dmg