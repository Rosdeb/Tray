name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ##################################
  ## Windows
  ##################################
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Inno Setup Script
        shell: bash
        run: |
          cat > installer.iss << 'EOF'
          #define MyAppName "Tray"
          #define MyAppExeName "tray.exe"
          #define MyAppPublisher "YourCompanyName"

          [Setup]
          AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
          AppName={#MyAppName}
          AppVersion=1.0.0
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          UninstallDisplayIcon={app}\{#MyAppExeName}
          Compression=lzma2
          SolidCompression=yes
          OutputDir=Output
          OutputBaseFilename=Tray-Setup
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent
          EOF

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/Tray-Setup.exe

  ##################################
  ## macOS
  ##################################
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"

      - run: flutter pub get

      - run: flutter config --enable-macos-desktop

      - run: flutter build macos --release

      # Install create-dmg
      - run: brew install create-dmg

      # Create DMG
      - name: Build DMG
        run: |
          mkdir dmg
          cp -R build/macos/Build/Products/Release/*.app dmg/

          create-dmg \
            --volname "Tray" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            Tray.dmg \
            dmg/

      - uses: softprops/action-gh-release@v2
        with:
          files: Tray.dmg